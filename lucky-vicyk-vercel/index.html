<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍀 럭키비키 리프레이밍</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #1db954;
      --dark-green: #1a7a44;
      --gold: #e6a817;
      --bg: #f5f9f6;
      --card: #ffffff;
      --text: #1a2e22;
      --muted: #6b9e7a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(29,185,84,0.06) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.6s ease both;
    }

    .emoji-big {
      font-size: 64px;
      display: block;
      margin-bottom: 12px;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(10deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--green), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(29,185,84,0.15);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      animation: fadeUp 0.7s ease both;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--green);
    }

    textarea {
      width: 100%;
      background: #f8faf9;
      border: 1.5px solid rgba(29,185,84,0.2);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 14px;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--green);
    }

    .char-count {
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, var(--green), var(--dark-green));
      color: #fff;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: -0.3px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(29,185,84,0.35);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .examples {
      margin-top: 20px;
    }

    .examples p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .example-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: rgba(29,185,84,0.06);
      border: 1px solid rgba(29,185,84,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.83rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      background: rgba(29,185,84,0.15);
      color: var(--green);
    }

    .result-card {
      margin-top: 24px;
      background: linear-gradient(135deg, rgba(29,185,84,0.06), rgba(230,168,23,0.04));
      border: 1.5px solid rgba(29,185,84,0.25);
      border-radius: 16px;
      padding: 22px;
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .result-card.show { display: block; }

    .result-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .result-text {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .loading.show { display: block; }

    .dots::after {
      content: '';
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }

    .error {
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(231,76,60,0.08);
      border: 1px solid rgba(231,76,60,0.2);
      border-radius: 10px;
      color: #e74c3c;
      font-size: 0.88rem;
      display: none;
    }

    .error.show { display: block; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="emoji-big">🍀</span>
    <h1>럭키비키 리프레이밍</h1>
    <p class="subtitle">안 좋은 상황을 럭키한 시각으로 바꿔드려요</p>
  </div>

  <div class="card">
    <label>지금 어떤 상황인가요?</label>
    <textarea
      id="situation"
      placeholder="힘든 상황을 솔직하게 적어주세요 😊"
      maxlength="500"
      oninput="updateCount()"
    ></textarea>
    <div class="char-count"><span id="count">0</span> / 500</div>

    <button class="btn" onclick="reframe()">럭키비키로 바꾸기 🍀</button>

    <div class="examples">
      <p>예시 상황</p>
      <div class="example-tags">
        <span class="tag" onclick="fillExample('오늘 지각해서 혼났어')">오늘 지각해서 혼났어</span>
        <span class="tag" onclick="fillExample('카드를 잃어버렸어')">카드를 잃어버렸어</span>
        <span class="tag" onclick="fillExample('약속이 갑자기 취소됐어')">약속이 갑자기 취소됐어</span>
        <span class="tag" onclick="fillExample('비가 너무 많이 와')">비가 너무 많이 와</span>
      </div>
    </div>

    <div class="loading" id="loading">
      <span class="dots">럭키비키 생각 중</span>
    </div>

    <div class="error" id="error"></div>

    <div class="result-card" id="result">
      <div class="result-label">✨ 럭키비키 버전</div>
      <div class="result-text" id="result-text"></div>
    </div>
  </div>

  <script>
    function updateCount() {
      const val = document.getElementById('situation').value;
      document.getElementById('count').textContent = val.length;
    }

    function fillExample(text) {
      document.getElementById('situation').value = text;
      updateCount();
    }

    async function reframe() {
      const situation = document.getElementById('situation').value.trim();
      if (!situation) {
        showError('상황을 입력해주세요! 😊');
        return;
      }

      const btn = document.querySelector('.btn');
      btn.disabled = true;

      document.getElementById('loading').classList.add('show');
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').classList.remove('show');

      try {
        const res = await fetch('/api/reframe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ situation })
        });

        if (!res.ok) throw new Error('서버 오류가 발생했어요');

        const data = await res.json();
        document.getElementById('result-text').textContent = data.result;
        document.getElementById('result').classList.add('show');

      } catch (err) {
        showError('오류가 발생했어요. 다시 시도해주세요! 😅');
        console.error(err);
      } finally {
        document.getElementById('loading').classList.remove('show');
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.metaKey) reframe();
    });
  </script>

</body>
</html>
